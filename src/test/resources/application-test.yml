spring:
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:h2:mem:slms;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false

security:
  jwt:
    secret: test-jwt-secret-key-with-at-least-32-chars
    expiration-ms: 3600000
